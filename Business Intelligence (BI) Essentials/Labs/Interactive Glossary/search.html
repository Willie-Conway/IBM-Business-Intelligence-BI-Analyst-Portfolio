<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search All BI Terms</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Additional styles for search page */
        .search-container {
            padding: 30px 40px;
            background: #f7fafc;
            border-bottom: 1px solid #cbd5e0;
        }
        
        .search-header {
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        
        .main-search {
            flex: 1;
            min-width: 300px;
            padding: 15px 20px;
            border: 2px solid #cbd5e0;
            border-radius: 10px;
            font-size: 16px;
        }
        
        .filter-select {
            padding: 15px 20px;
            border: 2px solid #cbd5e0;
            border-radius: 10px;
            font-size: 16px;
            background: white;
        }
        
        .search-stats {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            color: #4a5568;
        }
        
        .module-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 20px;
        }
        
        .module-filter-btn {
            padding: 8px 16px;
            background: white;
            border: 2px solid #cbd5e0;
            border-radius: 20px;
            cursor: pointer;
            font-size: 14px;
        }
        
        .module-filter-btn.active {
            background: #3182ce;
            color: white;
            border-color: #3182ce;
        }
        
        .alphabet-quick {
            padding: 20px 40px;
            background: white;
            border-bottom: 1px solid #cbd5e0;
        }
        
        .letter-quick {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 35px;
            height: 35px;
            margin: 2px;
            background: #f7fafc;
            border: 1px solid #cbd5e0;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
        }
        
        .letter-quick:hover {
            background: #3182ce;
            color: white;
        }
        
        .results-container {
            padding: 30px 40px;
        }
        
        .no-results {
            text-align: center;
            padding: 60px 20px;
            color: #718096;
        }
        
        .term-result {
            background: white;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            border-left: 4px solid;
        }
        
        .term-result h3 {
            color: #1a365d;
            margin-bottom: 10px;
            font-size: 18px;
        }
        
        .term-result p {
            color: #4a5568;
            line-height: 1.6;
            margin-bottom: 10px;
        }
        
        .term-meta {
            display: flex;
            gap: 15px;
            font-size: 12px;
            color: #718096;
        }
        
        .module-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
        }
        
        .module-1-badge { background: #e3f2fd; color: #3498db; }
        .module-2-badge { background: #e8f5e9; color: #2ecc71; }
        .module-3-badge { background: #f3e5f5; color: #9b59b6; }
        .module-4-badge { background: #ffebee; color: #e74c3c; }
        .module-5-badge { background: #fff3e0; color: #f39c12; }
        
        .module-1-border { border-left-color: #3498db; }
        .module-2-border { border-left-color: #2ecc71; }
        .module-3-border { border-left-color: #9b59b6; }
        .module-4-border { border-left-color: #e74c3c; }
        .module-5-border { border-left-color: #f39c12; }
        
        @media (max-width: 768px) {
            .search-container, .alphabet-quick, .results-container {
                padding: 20px;
            }
            
            .search-header {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Back Button -->
        <a href="index.html" class="back-button">← Back to Modules</a>
        
        <!-- Search Header -->
        <div class="search-container">
            <h2 style="color: #1a365d; margin-bottom: 20px;">Search All BI Terms</h2>
            
            <div class="search-header">
                <input type="text" 
                       class="main-search" 
                       id="mainSearch" 
                       placeholder="Search across all 200+ terms...">
                
                <select class="filter-select" id="sortSelect">
                    <option value="relevance">Sort by Relevance</option>
                    <option value="az">Sort A-Z</option>
                    <option value="module">Sort by Module</option>
                </select>
            </div>
            
            <!-- Module Filters -->
            <div class="module-filter">
                <button class="module-filter-btn active" data-module="all">All Modules</button>
                <button class="module-filter-btn" data-module="1">Module 1: BI Intro</button>
                <button class="module-filter-btn" data-module="2">Module 2: Data Ecosystem</button>
                <button class="module-filter-btn" data-module="3">Module 3: Analytics</button>
                <button class="module-filter-btn" data-module="4">Module 4: Wrangling</button>
                <button class="module-filter-btn" data-module="5">Module 5: Visualization</button>
            </div>
            
            <!-- Search Stats -->
            <div class="search-stats">
                <div id="resultsCount">Enter search term...</div>
                <div id="searchTips">Tip: Try "SQL", "ETL", "KPI", "Python", "Tableau"</div>
            </div>
        </div>
        
        <!-- Alphabet Quick Nav -->
        <div class="alphabet-quick">
            <div style="margin-bottom: 10px; color: #4a5568; font-size: 14px;">Quick jump:</div>
            <div id="alphabetQuick">
                <!-- Letters will be added by JavaScript -->
            </div>
        </div>
        
        <!-- Results Container -->
        <div class="results-container">
            <div id="searchResults">
                <!-- Results will be added by JavaScript -->
                <div class="no-results">
                    <h3>Search All BI Terms</h3>
                    <p>Enter a search term above to find definitions across all 5 modules</p>
                    <p style="margin-top: 20px;">
                        <strong>Popular searches:</strong><br>
                        <span style="display: inline-block; margin: 5px; padding: 5px 10px; background: #e2e8f0; border-radius: 15px;">SQL</span>
                        <span style="display: inline-block; margin: 5px; padding: 5px 10px; background: #e2e8f0; border-radius: 15px;">ETL</span>
                        <span style="display: inline-block; margin: 5px; padding: 5px 10px; background: #e2e8f0; border-radius: 15px;">KPI</span>
                        <span style="display: inline-block; margin: 5px; padding: 5px 10px; background: #e2e8f0; border-radius: 15px;">Python</span>
                        <span style="display: inline-block; margin: 5px; padding: 5px 10px; background: #e2e8f0; border-radius: 15px;">Tableau</span>
                    </p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // Combined terms from all modules
        const allTerms = [
            // Module 1: Introduction to BI
            { term: "Analytics technologies", definition: "A variety of data-driven methodologies and techniques to address queries, identify patterns, forecast outcomes, and automate decision-making processes.", module: 1 },
            { term: "Analytical strategies", definition: "A long-term decision for an organization to use data to take actions to satisfy organizational vision and mission.", module: 1 },
            { term: "Apache Airflow", definition: "An open-source workflow management platform for data engineering pipelines.", module: 1 },
            { term: "AWS data pipeline", definition: "A web service that helps you reliably process and move data between different AWS compute and storage services.", module: 1 },
            { term: "Azure Data Factory", definition: "Cloud-based ETL and data integration service that allows you to create data-driven workflows for orchestrating data movement.", module: 1 },
            { term: "Benchmarking", definition: "A process to measure your business's success compared to similar organizations to identify any performance gaps or areas of improvement.", module: 1 },
            { term: "Business analyst", definition: "A data professional who bridges the gap between business objectives and technical solutions.", module: 1 },
            { term: "Business intelligence", definition: "A combination of various technologies, tools, and methodologies that gather, analyze, and transform data into meaningful information.", module: 1 },
            { term: "Business intelligence analyst", definition: "A professional who analyzes, models, and visualizes data to help businesses make informed decisions.", module: 1 },
            { term: "Business intelligence architect", definition: "A professional who designs and implements solutions that help organizations in making decisions.", module: 1 },
            { term: "Business intelligence developer", definition: "An engineer who is in charge of developing, deploying, and maintaining BI interfaces.", module: 1 },
            { term: "Business intelligence initiative", definition: "The goal of organizations to improve their revenue, operational efficiency, and competitive edge with better business decisions.", module: 1 },
            { term: "Business intelligence manager", definition: "A professional who uses data analysis to suggest and execute decisions for a company.", module: 1 },
            { term: "Business intelligence platform", definition: "A cluster of tools and applications that enables organizations to analyze data and get the insights to make decisions.", module: 1 },
            { term: "Business intelligence strategies", definition: "The blueprint that a company generates to use the data.", module: 1 },
            { term: "Business intelligence tools", definition: "Proprietary or open-source application software that is used to collect, process, analyze, sort, filter, and report large data from the systems and transform raw data into useful information.", module: 1 },
            { term: "Corporate performance management (CPM)", definition: "A software that integrates information from various sources to support operational plans and align key performance indicators or KPIs to improve financial planning.", module: 1 },
            { term: "Customer relationship management (CRM) software", definition: "Software that helps companies measure and control their lead generation and sales pipelines.", module: 1 },
            { term: "Data analysis", definition: "A process that involves cleaning, transforming, and modeling data with the aim of uncovering useful information to aid business decision-making.", module: 1 },
            { term: "Data analyst", definition: "A data professional who first gathers and understands the data, then analyzes and interprets it before visualizing it and, finally, weaving it into a story.", module: 1 },
            { term: "Data analytics", definition: "A process that focuses on extracting valuable information from data using various tools, techniques, processes, and algorithms. It includes data analysis and the interpretation of the results, keeping in mind specific business objectives.", module: 1 },
            { term: "Data engineer", definition: "A professional responsible for building robust data architecture and easily accessible data warehouses. They also design, construct, and evaluate scalable big data environments to support businesses with the key objective of providing stable and highly optimized data pipelines and systems.", module: 1 },
            { term: "Data governance analyst", definition: "A data professional who helps a business ensure that its data is accurate, consistent, and compliant with legal and regulatory requirements. They also plan and execute security measures to protect and preserve computer databases.", module: 1 },
            { term: "Data integration", definition: "A combination of technical and business processes that combine data from disparate sources into meaningful and valuable information.", module: 1 },
            { term: "Data marts", definition: "A partition to manage one specific business function, department, or subject area in data warehouses. They are also called subsets. Data marts make specific data available to a defined group of users, which allows those users to quickly access critical insights without wasting time searching through an entire data warehouse.", module: 1 },
            { term: "Data mining", definition: "The process of uncovering patterns and other valuable information from large data sets.", module: 1 },
            { term: "Data modeling", definition: "The process of creating a visual representation of either a whole information system or parts of it to communicate connections between data points and structures.", module: 1 },
            { term: "Data modeling tool", definition: "Software applications that help you to design, create, and manage data models.", module: 1 },
            { term: "Data repositories", definition: "Also termed a data archive or library, it refers to a data set identified to be mined for reporting and analysis.", module: 1 },
            { term: "Data science", definition: "Process that focuses on understanding the data. This involves data analysis, beginning with data loading, exploring, and cleaning. It creatively explores data, coming up with new solutions and inventions.", module: 1 },
            { term: "Data scientist", definition: "A data professional who develops algorithms, builds predictive models, and uncovers patterns and trends in large data sets. They apply statistical analysis, especially inferential statistics, machine learning, and predictive modeling, to extract insights from data and make predictions.", module: 1 },
            { term: "Data storytelling", definition: "Skill that involves analyzing data to communicate insights and influence decisions.", module: 1 },
            { term: "Data visualization", definition: "The graphical representation of information and data. It helps data visualization to understand trends, outliers, and patterns in data.", module: 1 },
            { term: "Data warehouse", definition: "A warehouse that pulls together data from many different sources into a single data repository for sophisticated analytics and decision support.", module: 1 },
            { term: "Descriptive analysis", definition: "The process of utilizing statistical techniques to explain or summarize a specific set of data. Descriptive analysis is also called descriptive statistics.", module: 1 },
            { term: "E-commerce", definition: "A platform for buying and selling products and services and transmitting funds and data over the internet.", module: 1 },
            { term: "Enterprise resource planning (ERP) systems", definition: "Software systems that enable businesses to automate and efficiently manage their key business processes to gain optimal performance.", module: 1 },
            { term: "Extract, load, transform (ETL) process", definition: "A process that extracts, loads, and transforms data from multiple sources to a data warehouse or other unified data repository.", module: 1 },
            { term: "Flat files", definition: "A collection of data that is stored specifically in a two-dimensional database. It usually contains a series of records (or lines), where each record is usually a sequence of fields.", module: 1 },
            { term: "IBM InfoSphere DataStage", definition: "ETL tool and part of the IBM Information Platforms Solutions suite and IBM InfoSphere. It uses a graphical notation to construct data integration solutions.", module: 1 },
            { term: "JavaScript", definition: "A high-level scripting or programming language that empowers the implementation of complex and sophisticated functionalities on web pages.", module: 1 },
            { term: "Key performance indicators (KPI)", definition: "Performance measures for specific objectives that provide targets, milestones, and insights to help teams and individuals make better decisions.", module: 1 },
            { term: "Machine learning engineers", definition: "Programmers who construct the algorithms, systems, models, and frameworks that enable machines to learn and perform functions independently and effectively.", module: 1 },
            { term: "Online analytical processing (OLAP)", definition: "Software that is used to conduct multidimensional analysis on large volumes of data from a data warehouse, data mart, or other centralized data store.", module: 1 },
            { term: "Python", definition: "An agile, dynamically typed, expressive, open-source programming language that supports multiple programming philosophies, including procedural, object-oriented, and functional. Python is a popular high-level programming language that is easily extensible through the use of third-party packages and often allows powerful functions to be written with few lines of code.", module: 1 },
            { term: "Real-time BI", definition: "A tool that provides up-to-the-minute information and analysis, which enables businesses to monitor KPIs in real time.", module: 1 },
            { term: "Return on investment (ROI)", definition: "A performance measure that is used to evaluate the efficiency of an investment.", module: 1 },
            { term: "SQL server integration services (SSIS)", definition: "Enterprise data integration, data transformation, and data migration tool built into Microsoft's SQL Server database. It can be used for a variety of integration-related tasks, such as analyzing and cleansing data and running extract, transform, and load (ETL) processes to update data warehouses.", module: 1 },
            { term: "Statistical tool", definition: "A tool that converts, analyzes, interprets, and uses data in different forms and purposes.", module: 1 },
            { term: "Structured query language (SQL)", definition: "Computer language, which is used to interact with a relational database.", module: 1 },
            { term: "Talend", definition: "An ETL tool for data integration that provides software solutions for data preparation, quality, integration, application integration, management, and big data. Talend has a separate product for all these solutions.", module: 1 },
            
            // Module 2: The Data Ecosystem (sample terms - add more as needed)
            { term: "Apache Beam", definition: "An open-source, unified programming model for batch and streaming data processing pipelines.", module: 2 },
            { term: "Apache HBase", definition: "A non-relational database that runs on Hadoop, providing real-time access to large data sets.", module: 2 },
            { term: "Apache Kafka", definition: "An open-source software platform used to handle real-time data feeds.", module: 2 },
            { term: "Big data", definition: "A dynamic, large, and disparate volume of data being created by people, tools, and machines.", module: 2 },
            { term: "Hadoop", definition: "A collection of tools that provides distributed storage and processing of big data.", module: 2 },
            { term: "MongoDB", definition: "An open-source, nonrelational database management system that uses flexible documents instead of tables and rows.", module: 2 },
            { term: "NoSQL database", definition: "A non-tabular database that stores data with different data storage tables than relational tables.", module: 2 },
            
            // Module 3: BI Analytics Landscape (sample terms)
            { term: "Anonymization", definition: "The process of modifying personal data so it is no longer possible to identify the individuals associated with it.", module: 3 },
            { term: "Authentication", definition: "The process of confirming the identity of a user or application seeking access to data.", module: 3 },
            { term: "Authorization", definition: "The process of determining whether an authenticated user has the right to perform an operation.", module: 3 },
            { term: "Predictive analytics", definition: "A type of analytics used to predict future outcomes. It relies on historical data and employs various techniques such as statistical modeling, data mining, and machine learning for predictions.", module: 3 },
            { term: "Prescriptive analytics", definition: "A type of data analytics that recommends the optimal course of action to achieve a specific goal, drawing from inputs from descriptive, diagnostic, and predictive analytics processes.", module: 3 },
            { term: "Self-service business intelligence (SSBI)", definition: "The process, tools, or software that allows business users to ask questions about their data, get insights, and analyze data without relying on IT, BI specialists, or SQL to take business actions.", module: 3 },
            
            // Module 4: Gathering and Wrangling Data (sample terms)
            { term: "Amazon Web Services (AWS)", definition: "A cloud-computing platform that offers economical online app development tools and services.", module: 4 },
            { term: "Application programming interface (API)", definition: "APIs are predefined rules that allow software applications to communicate with each other, process data transfers, and enable the sharing of application data and functionality between companies and external parties.", module: 4 },
            { term: "Data cleaning", definition: "An essential process of preparing and validating data before performing analysis. It is an integral part of building a data model.", module: 4 },
            { term: "Data wrangling", definition: "An iterative process that involves data exploration, transformation, and validation, making it available for a credible and meaningful analysis.", module: 4 },
            { term: "Google DataPrep", definition: "An intelligent cloud data service allows visually exploring, cleaning, and preparing both structured and unstructured data for analysis.", module: 4 },
            
            // Module 5: Mining and Visualizing Data (sample terms)
            { term: "Affinity grouping", definition: "A technique used to discover co-occurrences in relationships.", module: 5 },
            { term: "Bokeh", definition: "A Python library that provides interactive charts and plots and is known for delivering high-performance interactivity over large or streaming datasets.", module: 5 },
            { term: "Dash", definition: "A Python framework for creating interactive web-based visualizations. Dash can be used to build highly interactive web applications using Python code.", module: 5 },
            { term: "Dashboards", definition: "Tool to present a bird's-eye view of the complete picture while also allowing you to drill down into the next level of information for each parameter.", module: 5 },
            { term: "Matplotlib", definition: "A widely used Python data visualization library. It provides different kinds of 2D and 3D plots and the flexibility to create plots in several different ways.", module: 5 },
            { term: "Power BI", definition: "A cloud-based business analytics service from Microsoft that enables you to create reports and dashboards.", module: 5 },
            { term: "Tableau", definition: "A software company that produces interactive data visualization products. Using Tableau products, you can create interactive graphs and charts in the form of dashboards and worksheets.", module: 5 }
        ];

        // Module names for display
        const moduleNames = {
            1: "Module 1: BI Intro",
            2: "Module 2: Data Ecosystem", 
            3: "Module 3: Analytics",
            4: "Module 4: Wrangling",
            5: "Module 5: Visualization"
        };

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            // Setup alphabet quick nav
            setupAlphabetQuick();
            
            // Setup search
            setupSearch();
            
            // Setup filters
            setupFilters();
            
            // Setup sort
            setupSort();
        });

        function setupAlphabetQuick() {
            const alphabetQuick = document.getElementById('alphabetQuick');
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
            
            letters.forEach(letter => {
                const span = document.createElement('span');
                span.className = 'letter-quick';
                span.textContent = letter;
                span.title = `Terms starting with ${letter}`;
                span.onclick = function() {
                    document.getElementById('mainSearch').value = letter;
                    performSearch();
                };
                alphabetQuick.appendChild(span);
            });
        }

        function setupSearch() {
            const searchInput = document.getElementById('mainSearch');
            let searchTimeout;
            
            searchInput.addEventListener('input', function() {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    performSearch();
                }, 300);
            });
            
            // Also search on enter
            searchInput.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    performSearch();
                }
            });
        }

        function setupFilters() {
            document.querySelectorAll('.module-filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    // Remove active from all buttons
                    document.querySelectorAll('.module-filter-btn').forEach(b => {
                        b.classList.remove('active');
                    });
                    // Add active to clicked button
                    this.classList.add('active');
                    // Perform search with new filter
                    performSearch();
                });
            });
        }

        function setupSort() {
            document.getElementById('sortSelect').addEventListener('change', function() {
                performSearch();
            });
        }

        function getActiveModule() {
            const activeBtn = document.querySelector('.module-filter-btn.active');
            return activeBtn ? activeBtn.dataset.module : 'all';
        }

        function getSortMethod() {
            return document.getElementById('sortSelect').value;
        }

        function performSearch() {
            const searchTerm = document.getElementById('mainSearch').value.toLowerCase();
            const activeModule = getActiveModule();
            const sortMethod = getSortMethod();
            const resultsContainer = document.getElementById('searchResults');
            const resultsCount = document.getElementById('resultsCount');
            
            // Filter terms
            let filteredTerms = allTerms.filter(term => {
                // Apply module filter
                if (activeModule !== 'all' && term.module != activeModule) {
                    return false;
                }
                
                // Apply search filter
                if (searchTerm) {
                    const termLower = term.term.toLowerCase();
                    const defLower = term.definition.toLowerCase();
                    if (!termLower.includes(searchTerm) && !defLower.includes(searchTerm)) {
                        return false;
                    }
                }
                
                return true;
            });
            
            // Sort results
            if (sortMethod === 'az') {
                filteredTerms.sort((a, b) => a.term.localeCompare(b.term));
            } else if (sortMethod === 'module') {
                filteredTerms.sort((a, b) => a.module - b.module || a.term.localeCompare(b.term));
            } else {
                // Relevance sort (default) - terms matching in title come first
                filteredTerms.sort((a, b) => {
                    const aTitleMatch = a.term.toLowerCase().includes(searchTerm);
                    const bTitleMatch = b.term.toLowerCase().includes(searchTerm);
                    
                    if (aTitleMatch && !bTitleMatch) return -1;
                    if (!aTitleMatch && bTitleMatch) return 1;
                    
                    return a.term.localeCompare(b.term);
                });
            }
            
            // Update results count
            resultsCount.textContent = filteredTerms.length === 0 
                ? "No results found" 
                : `Found ${filteredTerms.length} term${filteredTerms.length !== 1 ? 's' : ''}`;
            
            // Display results
            if (filteredTerms.length === 0) {
                resultsContainer.innerHTML = `
                    <div class="no-results">
                        <h3>No matching terms found</h3>
                        <p>Try a different search term or clear the module filter</p>
                    </div>
                `;
            } else {
                let resultsHTML = '';
                
                filteredTerms.forEach(term => {
                    const moduleName = moduleNames[term.module];
                    const moduleClass = `module-${term.module}-border`;
                    const badgeClass = `module-${term.module}-badge`;
                    
                    resultsHTML += `
                        <div class="term-result ${moduleClass}">
                            <h3>${term.term}</h3>
                            <p>${term.definition}</p>
                            <div class="term-meta">
                                <span class="module-badge ${badgeClass}">${moduleName}</span>
                                <span>Starts with: ${term.term.charAt(0).toUpperCase()}</span>
                            </div>
                        </div>
                    `;
                });
                
                resultsContainer.innerHTML = resultsHTML;
            }
            
            // Update search tips
            updateSearchTips(searchTerm, filteredTerms.length);
        }

        function updateSearchTips(searchTerm, resultCount) {
            const tipsElement = document.getElementById('searchTips');
            
            if (!searchTerm) {
                tipsElement.textContent = 'Tip: Try "SQL", "ETL", "KPI", "Python", "Tableau"';
            } else if (resultCount === 0) {
                tipsElement.textContent = 'Tip: Try shorter or more general terms';
            } else if (resultCount > 20) {
                tipsElement.textContent = 'Tip: Try adding more specific keywords';
            } else {
                tipsElement.textContent = '';
            }
        }

        // Quick search examples
        function quickSearch(term) {
            document.getElementById('mainSearch').value = term;
            performSearch();
        }

        // Expose to global scope for testing
        window.quickSearch = quickSearch;
    </script>
</body>
</html>
